name: ozaiptv
description: OzaIPTV — Premium IPTV/OTT streaming application with live channels, EPG, fallback sources, and TV-friendly UI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  flutter_launcher_icons: ^0.14.2
  # Code Generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Navigation
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3+1

  # Local Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # Video Playback
  video_player: ^2.8.7
  chewie: ^1.8.1

  # UI & Design
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  gap: ^3.0.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  logger: ^2.2.0
  path_provider: ^2.1.3
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0
  collection: ^1.18.0
  equatable: ^2.0.5
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

  # Linting
  flutter_lints: ^4.0.0
  very_good_analysis: ^5.1.0

  # Testing
  mocktail: ^1.0.3
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/athk_v3.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/images/athk_v3.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/images/athk_v3.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/images/ozaiptv_icon.png"
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logos/
    - assets/mock/
    - assets/animations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        # - asset: assets/fonts/Inter-SemiBold.ttf
        #   weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
