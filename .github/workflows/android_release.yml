name: Android Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Build type'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - appbundle
          - both
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    name: Build Release Android
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Decode the keystore from GitHub Secrets
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release-keystore.jks

      # Create key.properties from secrets
      - name: Create key.properties
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release-keystore.jks
          EOF

      # Build APK
      - name: Build release APK
        if: >
          github.event.inputs.release_type == 'apk' ||
          github.event.inputs.release_type == 'both' ||
          startsWith(github.ref, 'refs/tags/')
        run: flutter build apk --release

      # Build App Bundle
      - name: Build release App Bundle
        if: >
          github.event.inputs.release_type == 'appbundle' ||
          github.event.inputs.release_type == 'both' ||
          startsWith(github.ref, 'refs/tags/')
        run: flutter build appbundle --release

      # Upload artifacts
      - name: Upload release APK
        if: >
          github.event.inputs.release_type == 'apk' ||
          github.event.inputs.release_type == 'both' ||
          startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload release AAB
        if: >
          github.event.inputs.release_type == 'appbundle' ||
          github.event.inputs.release_type == 'both' ||
          startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      # Cleanup secrets
      - name: Cleanup keystore
        if: always()
        run: |
          rm -f android/app/release-keystore.jks
          rm -f android/key.properties

      # Create GitHub Release (tag-triggered only)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: true
